name: Deploy MCP Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: true
          tags: ghcr.io/daymoondevelopment/post-for-me-mcp:${{ github.sha }},ghcr.io/daymoondevelopment/post-for-me-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Unkey CLI
        run: |
          curl -sL https://github.com/unkeyed/unkey/releases/latest/download/unkey_Linux_x86_64.tar.gz | tar xz
          chmod +x unkey
          ./unkey --version

      - name: Deploy MCP Server to Unkey
        id: unkey
        env:
          UNKEY_ROOT_KEY: ${{ secrets.UNKEY_ROOT_KEY }}
          UNKEY_PROJECT: ${{ secrets.UNKEY_PROJECT }}
          UNKEY_APP: ${{ secrets.UNKEY_APP }}
        run: ./unkey deploy --env=production ghcr.io/daymoondevelopment/post-for-me-mcp:${{ github.sha }}
